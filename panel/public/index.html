<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PANEL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sbhead">
      <h1>PANEL</h1>
      <span class="sbstats" id="sbstats">0</span>
    </div>
    <div class="sbsearch">
      <input type="text" id="search" placeholder="search clients..." oninput="onsearch()">
    </div>
    <div class="sbtoolbar">
      <button onclick="clearall()" title="clear all">clear</button>
    </div>
    <div id="clientlist"></div>
  </aside>
  <main id="main">
    <div id="welcome">
      <div class="wicon">◈</div>
      <h2>waiting for data...</h2>
      <p>clients will appear here when they check in</p>
    </div>
    <div id="detail"></div>
  </main>
</div>
<div id="toasts"></div>
<script src="script.js"></script>
</body>
</html>
